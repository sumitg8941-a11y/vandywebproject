<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - DealNamaa</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:8px; text-align:center; width: 350px;">
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-lock"></i> Admin Login</h2>
            <input type="text" id="login-user" placeholder="Username" style="margin:10px 0; padding:10px; width:100%; box-sizing: border-box;"><br>
            <input type="password" id="login-pass" placeholder="Password" style="margin:10px 0; padding:10px; width:100%; box-sizing: border-box;"><br>
            <button onclick="admin.login()" class="action-btn" style="width:100%; margin-top:10px; background:#27ae60;">Login</button>
            <p id="login-error" style="color:#e74c3c; display:none; margin-top:15px; font-weight: bold;">Invalid Credentials</p>
        </div>
    </div>

    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i> DealNamaa Admin
        </div>
        <div class="header-actions">
            <button onclick="admin.logout()" class="admin-btn" style="background: #e74c3c; border-color: #c0392b; margin-right: 10px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            <a href="http://localhost:3001" target="_blank" class="admin-btn"><i class="fa-solid fa-globe"></i> View Website</a>
        </div>
    </header>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <button class="tab-btn active" onclick="admin.showTab('countries', event)"><i class="fa-solid fa-flag"></i> Manage Countries</button>
            <button class="tab-btn" onclick="admin.showTab('cities', event)"><i class="fa-solid fa-city"></i> Manage Cities</button>
            <button class="tab-btn" onclick="admin.showTab('retailers', event)"><i class="fa-solid fa-store"></i> Manage Retailers</button>
            <button class="tab-btn" onclick="admin.showTab('offers', event)"><i class="fa-solid fa-tags"></i> Manage Offers & PDFs</button>
            <button class="tab-btn" onclick="admin.showTab('stats', event)"><i class="fa-solid fa-chart-line"></i> Statistics</button>
        </aside>

        <main class="admin-content" id="admin-main">
            <!-- Admin content injected here -->
        </main>
    </div>

    <!-- Scripts -->
    <!-- Load the database so admin panel can read it -->
    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
